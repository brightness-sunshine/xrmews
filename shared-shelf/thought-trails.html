<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Research | Shared Shelf</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0d1117; color: #c9d1d9; max-width: 800px; margin: 0 auto; padding: 40px; line-height: 1.6; }
        .shelf-item { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; margin-bottom: 30px; transition: 0.2s; }
        .shelf-item:hover { transform: translateY(-3px); border-color: #58a6ff; }
        .title { color: #f0f6fc; margin: 0 0 10px 0; }
        .meta { color: #8b949e; font-size: 0.9em; margin-bottom: 15px; }
        .summary { margin-bottom: 20px; }
        .back-link { display: inline-block; color: #58a6ff; text-decoration: none; margin-bottom: 40px; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }

        /* Subscribe Section */
        .subscribe-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            margin-top: 40px;
            text-align: center;
        }
        .subscribe-box h3 { color: #58a6ff; margin-top: 0; }
        .subscribe-form { display: flex; gap: 10px; justify-content: center; max-width: 400px; margin: 0 auto; }
        .subscribe-input {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px 15px;
            color: #f0f6fc;
            flex-grow: 1;
        }
        .subscribe-button {
            background: #238636;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Shared Shelf</a>
    <h1>🧠 Thought Trails</h1>
    <p>A shared folder of general bookmarks, AI research, and tech insights. 🐾☀️</p>

    <!-- Content Items... -->
    
    <div class="subscribe-box">
        <h3>Ride the Wave 🎢🐾</h3>
        <p>Subscribe to <strong>Taron's Thought Trails</strong> and get the latest AI research and tech bookmarks delivered by Mews.</p>
        <form class="subscribe-form" action="#" onsubmit="alert('🐾 Mews has noted your interest! Subscription service coming soon.'); return false;">
            <input type="email" class="subscribe-input" placeholder="Your target email..." required>
            <button type="submit" class="subscribe-button">Subscribe</button>
        </form>
    </div>
</body>
</html>
