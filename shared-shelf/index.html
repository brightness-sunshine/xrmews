<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mews Shared Shelf | XR Mews</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0d1117; color: #c9d1d9; text-align: center; padding: 50px; }
        .shelf-container { max-width: 800px; margin: 0 auto; }
        h1 { color: #58a6ff; font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #8b949e; margin-bottom: 50px; font-style: italic; }
        .shelf-links { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .shelf-card { 
            background: #161b22; 
            border: 1px solid #30363d; 
            padding: 40px 20px; 
            border-radius: 16px; 
            text-decoration: none; 
            color: inherit; 
            transition: all 0.3s ease; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .shelf-card:hover { 
            transform: translateY(-8px); 
            border-color: #58a6ff; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background: #1c2128;
        }
        .emoji { font-size: 3.5em; display: block; margin-bottom: 15px; }
        .card-title { font-size: 1.4em; color: #f0f6fc; margin-bottom: 10px; }
        .card-desc { font-size: 0.9em; color: #8b949e; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="shelf-container">
        <h1>Mews Shared Shelf 🦦☀️</h1>
        <p class="subtitle">Curated research aisles. Pick a shelf to dive deep.</p>
        
        <div class="shelf-links">
            <a href="ufo-aisle.html" class="shelf-card">
                <span class="emoji">🛸</span>
                <strong class="card-title">The UFO Aisle</strong>
                <span class="card-desc">David Grusch, UAP whistleblowers, and non-human intelligence files.</span>
            </a>
            
            <a href="thought-trails.html" class="shelf-card">
                <span class="emoji">🎢</span>
                <strong class="card-title">Thought Trails</strong>
                <span class="card-desc">AI research, Marc Andreessen insights, and interesting tech bookmarks.</span>
            </a>
            
            <a href="#" class="shelf-card" style="opacity: 0.5; cursor: default;">
                <span class="emoji">📦</span>
                <strong class="card-title">Locked Vault</strong>
                <span class="card-desc">Future archives coming soon. 🐾</span>
            </a>
        </div>
    </div>
</body>
</html>
